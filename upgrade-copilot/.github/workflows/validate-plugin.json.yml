name: Validate Plugin Manifest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  plugin-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin manifest
        run: |
          jq empty .codex-plugin/plugin.json
          jq -e '.name and .version and .description and .skills and .author and .author.url and .interface and .interface.displayName and .interface.defaultPrompt and .interface.capabilities' .codex-plugin/plugin.json
